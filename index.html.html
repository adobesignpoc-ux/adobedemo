<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Envío de Solicitud</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); max-width: 680px; width: 100%; padding: 40px; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
  .header-icon { background: #0078d4; border-radius: 12px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
  .header-icon svg { width: 26px; height: 26px; fill: #fff; }
  h1 { font-size: 1.4rem; color: #1a1a2e; font-weight: 700; }
  h1 span { display: block; font-size: 0.85rem; font-weight: 400; color: #666; margin-top: 2px; }

  .endpoint-box { background: #f8fafc; border: 1.5px dashed #b0c4de; border-radius: 10px; padding: 14px 16px; margin-bottom: 28px; }
  .endpoint-box label { font-size: 0.78rem; font-weight: 600; color: #0078d4; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
  .endpoint-box input { width: 100%; border: none; background: transparent; font-size: 0.88rem; color: #333; outline: none; }

  .section-title { font-size: 0.78rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; margin-top: 24px; border-bottom: 1px solid #eee; padding-bottom: 6px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:520px){ .grid2 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 0.85rem; font-weight: 600; color: #333; }
  .field input, .field select, .field textarea {
    border: 1.5px solid #dde3ea; border-radius: 8px; padding: 10px 12px;
    font-size: 0.92rem; color: #222; outline: none; transition: border .2s;
    font-family: inherit; background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #0078d4; box-shadow: 0 0 0 3px rgba(0,120,212,.10); }
  .field textarea { resize: vertical; min-height: 90px; }
  .field.required label::after { content: ' *'; color: #e53e3e; }

  /* File upload */
  .upload-area {
    border: 2px dashed #b0c4de; border-radius: 10px; padding: 28px 20px;
    text-align: center; cursor: pointer; transition: all .2s; background: #f8fafc;
    position: relative;
  }
  .upload-area:hover, .upload-area.dragover { border-color: #0078d4; background: #e8f4fd; }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2.2rem; margin-bottom: 8px; }
  .upload-area p { font-size: 0.88rem; color: #555; }
  .upload-area small { color: #999; font-size: 0.78rem; }

  .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    background: #f4f7fb; border-radius: 8px; padding: 8px 12px;
    border: 1px solid #e2e8f0;
  }
  .file-icon { font-size: 1.3rem; flex-shrink: 0; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 0.85rem; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 0.75rem; color: #888; }
  .file-remove { background: none; border: none; cursor: pointer; color: #aaa; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; transition: color .15s; flex-shrink:0; }
  .file-remove:hover { color: #e53e3e; }

  .btn-submit {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: #0078d4; color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 28px; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .2s, transform .1s;
  }
  .btn-submit:hover:not(:disabled) { background: #005fa3; }
  .btn-submit:active:not(:disabled) { transform: scale(.98); }
  .btn-submit:disabled { background: #a0c4e8; cursor: not-allowed; }

  .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { display: none; margin-top: 18px; padding: 14px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 500; align-items: center; gap: 10px; }
  .toast.show { display: flex; }
  .toast.success { background: #e6f9f0; color: #1a7a4a; border: 1px solid #b2dfc9; }
  .toast.error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c0bb; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    </div>
    <h1>Envío de Solicitud / Trámite <span>Complete el formulario y adjunte los documentos requeridos</span></h1>
  </div>

  <!-- Endpoint config -->
  <div class="endpoint-box">
    <label>🔗 URL del trigger de Power Automate</label>
    <input type="url" id="paUrl" placeholder="https://prod-xx.westus.logic.azure.com/workflows/..." />
  </div>

  <!-- Datos del solicitante -->
  <div class="section-title">📋 Datos del Solicitante</div>
  <div class="grid2">
    <div class="field required">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Juan Pérez García" />
    </div>
    <div class="field required">
      <label>Correo electrónico</label>
      <input type="email" id="correo" placeholder="juan@empresa.com" />
    </div>
  </div>
  <div class="grid2">
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="telefono" placeholder="+52 55 1234 5678" />
    </div>
    <div class="field">
      <label>Número de identificación / Expediente</label>
      <input type="text" id="expediente" placeholder="EXP-2024-0001" />
    </div>
  </div>

  <!-- Detalle del trámite -->
  <div class="section-title">📝 Detalle del Trámite</div>
  <div class="field required">
    <label>Tipo de trámite</label>
    <select id="tipo">
      <option value="">— Seleccione una opción —</option>
      <option>Alta de servicio</option>
      <option>Baja de servicio</option>
      <option>Modificación de datos</option>
      <option>Solicitud de información</option>
      <option>Queja o reclamación</option>
      <option>Solicitud de reembolso</option>
      <option>Otro</option>
    </select>
  </div>
  <div class="field required">
    <label>Descripción / Motivo</label>
    <textarea id="descripcion" placeholder="Describa detalladamente su solicitud..."></textarea>
  </div>
  <div class="field">
    <label>Observaciones adicionales</label>
    <textarea id="observaciones" placeholder="Información complementaria (opcional)..." style="min-height:60px"></textarea>
  </div>

  <!-- Adjuntos -->
  <div class="section-title">📎 Documentos Adjuntos</div>
  <div class="upload-area" id="dropZone">
    <input type="file" id="fileInput" multiple accept="*/*" />
    <div class="upload-icon">📂</div>
    <p><strong>Arrastra tus archivos aquí</strong> o haz clic para seleccionarlos</p>
    <small>PDF, Word, Excel, imágenes y más · Máx. 20 MB por archivo</small>
  </div>
  <div class="file-list" id="fileList"></div>

  <button class="btn-submit" id="btnSubmit" onclick="enviar()">
    <span id="btnText">Enviar Solicitud</span>
  </button>

  <div class="toast" id="toast"></div>
</div>

<script>
  let archivos = [];

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');

  fileInput.addEventListener('change', e => agregarArchivos(e.target.files));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    agregarArchivos(e.dataTransfer.files);
  });

  function agregarArchivos(files) {
    for (const f of files) {
      if (archivos.find(x => x.name === f.name && x.size === f.size)) continue;
      if (f.size > 20 * 1024 * 1024) { showToast('error', `❌ "${f.name}" supera los 20 MB.`); continue; }
      archivos.push(f);
    }
    renderFileList();
  }

  function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['pdf'].includes(ext)) return '📄';
    if (['doc','docx'].includes(ext)) return '📝';
    if (['xls','xlsx'].includes(ext)) return '📊';
    if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
    if (['zip','rar','7z'].includes(ext)) return '🗜️';
    return '📎';
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/(1024*1024)).toFixed(1) + ' MB';
  }

  function renderFileList() {
    fileList.innerHTML = archivos.map((f, i) => `
      <div class="file-item">
        <span class="file-icon">${fileIcon(f.name)}</span>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-size">${formatSize(f.size)}</div>
        </div>
        <button class="file-remove" onclick="eliminar(${i})" title="Quitar">✕</button>
      </div>
    `).join('');
  }

  function eliminar(i) { archivos.splice(i,1); renderFileList(); }

  function showToast(type, msg) {
    const t = document.getElementById('toast');
    t.className = `toast show ${type}`;
    t.innerHTML = (type==='success' ? '✅ ' : '⚠️ ') + msg;
    setTimeout(() => t.classList.remove('show'), 5000);
  }

  function setLoading(v) {
    const btn = document.getElementById('btnSubmit');
    const txt = document.getElementById('btnText');
    btn.disabled = v;
    btn.innerHTML = v
      ? `<div class="spinner"></div><span>Enviando...</span>`
      : `<span id="btnText">Enviar Solicitud</span>`;
  }

  async function enviar() {
    const url = document.getElementById('paUrl').value.trim();
    const nombre = document.getElementById('nombre').value.trim();
    const correo = document.getElementById('correo').value.trim();
    const tipo = document.getElementById('tipo').value;
    const descripcion = document.getElementById('descripcion').value.trim();

    if (!url) return showToast('error', 'Ingresa la URL del trigger de Power Automate.');
    if (!nombre) return showToast('error', 'El nombre completo es requerido.');
    if (!correo || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) return showToast('error', 'Ingresa un correo válido.');
    if (!tipo) return showToast('error', 'Selecciona el tipo de trámite.');
    if (!descripcion) return showToast('error', 'La descripción es requerida.');

    const fd = new FormData();
    fd.append('nombre', nombre);
    fd.append('correo', correo);
    fd.append('telefono', document.getElementById('telefono').value.trim());
    fd.append('expediente', document.getElementById('expediente').value.trim());
    fd.append('tipo_tramite', tipo);
    fd.append('descripcion', descripcion);
    fd.append('observaciones', document.getElementById('observaciones').value.trim());
    fd.append('fecha_envio', new Date().toISOString());

    archivos.forEach((f, i) => fd.append(`archivo_${i+1}`, f, f.name));

    setLoading(true);
    try {
      const res = await fetch(url, { method: 'POST', body: fd });
      if (res.ok || res.status === 202) {
        showToast('success', '¡Solicitud enviada correctamente! Recibirás una confirmación pronto.');
        // Reset
        ['nombre','correo','telefono','expediente','descripcion','observaciones'].forEach(id => document.getElementById(id).value='');
        document.getElementById('tipo').value='';
        archivos = []; renderFileList();
      } else {
        showToast('error', `Error del servidor: ${res.status} ${res.statusText}`);
      }
    } catch(e) {
      showToast('error', 'No se pudo conectar con Power Automate. Verifica la URL y los permisos CORS.');
    } finally { setLoading(false); }
  }
</script>
</body>
</html>
